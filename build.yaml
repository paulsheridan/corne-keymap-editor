include:
  # Keyboard halves - configured as peripherals for the dongle
  # Using nice_nano_v2 board definition (halves may be v2 hardware)
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view
  # Dongle - acts as the central USB receiver (confirmed v1 hardware)
  - board: nice_nano
    shield: corne_dongle dongle_display
  # Settings reset - one build per board version
  - board: nice_nano_v2
    shield: settings_reset
  - board: nice_nano
    shield: settings_reset

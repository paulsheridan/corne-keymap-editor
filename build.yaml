include:
  # Keyboard halves - configured as peripherals for the dongle
  - board: nice_nano
    shield: corne_left nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano
    shield: corne_right nice_view_adapter nice_view
  # Dongle - acts as the central USB receiver
  - board: nice_nano
    shield: corne_dongle dongle_display
  # Settings reset - flash to all three devices FIRST before flashing new firmware
  - board: nice_nano
    shield: settings_reset

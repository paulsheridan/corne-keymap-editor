include:
  # Eyelash Corne keyboard halves - use proper board definitions with correct GPIO
  - board: eyelash_corne_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: eyelash_corne_right
    shield: nice_view
  # Dongle with USB logging
  - board: nice_nano_v2
    shield: corne_dongle dongle_display
    snippet: zmk-usb-logging
  # Settings reset
  - board: nice_nano_v2
    shield: settings_reset

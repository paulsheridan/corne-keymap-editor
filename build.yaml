include:
  # Keyboard halves - confirmed v2 hardware despite v1 bootloader
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano_v2
    shield: corne_right
    snippet: zmk-usb-logging
  # Dongle with USB logging snippet
  - board: nice_nano_v2
    shield: corne_dongle dongle_display
    snippet: zmk-usb-logging
  # Settings reset
  - board: nice_nano_v2
    shield: settings_reset

include:
  # Keyboard halves - stripped down for diagnostics (no display shields)
  - board: nice_nano
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano
    shield: corne_right
  # Dongle - stripped down for diagnostics (no dongle_display)
  - board: nice_nano
    shield: corne_dongle
  # Settings reset
  - board: nice_nano
    shield: settings_reset

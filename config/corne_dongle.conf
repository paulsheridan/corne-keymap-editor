# Split keyboard - dongle is the central device
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BT connections: 2 peripherals + 5 BT profiles = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# USB HID output (required for dongle to appear as a keyboard to the computer)
CONFIG_ZMK_USB=y

# Increase wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

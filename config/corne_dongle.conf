# Split keyboard - dongle is the central device
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BT connections: 2 peripherals + 5 BT profiles = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# USB HID output (required for dongle to appear as a keyboard to the computer)
CONFIG_ZMK_USB=y

# Increase wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y


# External power rail (P0.13 on nice!nano v2) - powers the display
CONFIG_ZMK_EXT_POWER=y

# I2C for SH1106 OLED display
CONFIG_I2C=y

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# USB logging for debugging BLE split connection
CONFIG_ZMK_USB_LOGGING=y
